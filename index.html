<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Dashboard - Secure Admin Panel</title>
    
    <!-- Firebase SDKs (Compat v9) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- Leaflet for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0a0e17; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Login Screen Styling */
        #loginScreen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            padding: 20px;
        }
        
        .login-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }
        
        .login-card h2 { color: #00d4ff; margin-bottom: 10px; font-size: 24px; }
        .login-card p { color: #a0aec0; margin-bottom: 25px; font-size: 14px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; color: #a0aec0; font-size: 12px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0f1123;
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        .input-group input:focus { border-color: #00d4ff; box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #00d4ff;
            color: #0a0e17;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .login-btn:hover { background: #00b2d6; transform: translateY(-1px); }
        
        #errorMessage { color: #fc8181; font-size: 14px; margin-top: 15px; display: none; }

        /* Main Dashboard (Hidden by default) */
        #mainApp { display: none; width: 100%; }
        
        .navbar {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00d4ff;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .navbar h1 { color: #00d4ff; font-size: 22px; }
        .navbar h1 span { color: #fff; }
        
        .logout-btn {
            background: transparent;
            color: #fc8181;
            border: 1px solid #fc8181;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .logout-btn:hover { background: rgba(252, 129, 129, 0.1); }
        
        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }
        
        .stat-card h3 { color: #a0aec0; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .value { font-size: 28px; font-weight: bold; margin-top: 5px; }
        .stat-card .value.green { color: #48bb78; }
        .stat-card .value.red { color: #fc8181; }
        .stat-card .value.blue { color: #63b3ed; }
        .stat-card .value.yellow { color: #f6ad55; }
        
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }
        
        .card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }
        
        .card h2 { font-size: 16px; color: #00d4ff; margin-bottom: 15px; }
        #map { height: 350px; border-radius: 8px; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 10px;
            background: #1a1a2e;
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: #fff;
            display: none;
            z-index: 999;
            max-width: 400px;
        }
        .toast.show { display: block; animation: slideIn 0.3s ease; }
        
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @media (max-width: 900px) {
            .row { grid-template-columns: 1fr; }
            .navbar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen">
    <div class="login-card">
        <h2>System Verification</h2>
        <p>Sign in using your Firebase Auth account</p>
        
        <div class="input-group">
            <label for="emailInput">Email Address</label>
            <input type="email" id="emailInput" placeholder="admin@example.com" autocomplete="email">
        </div>

        <div class="input-group">
            <label for="passwordInput">Password</label>
            <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
        </div>
        
        <button class="login-btn" id="loginBtn" onclick="handleLogin()">Unlock Dashboard</button>
        <div id="errorMessage"></div>
    </div>
</div>

<!-- Main App Dashboard -->
<div id="mainApp">
    <nav class="navbar">
        <h1>🚗 Vehicle <span>Dashboard</span></h1>
        <button class="logout-btn" onclick="handleLogout()">Lock Dashboard</button>
    </nav>

    <div class="container">
        <div id="toast" class="toast"></div>

        <div class="stats">
            <div class="stat-card">
                <h3>Relay Status</h3>
                <div class="value" id="relayStatus">--</div>
            </div>
            <div class="stat-card">
                <h3>Acceleration (G)</h3>
                <div class="value blue" id="accelValue">0.00</div>
            </div>
            <div class="stat-card">
                <h3>GPS Status</h3>
                <div class="value" id="gpsStatus">--</div>
            </div>
            <div class="stat-card">
                <h3>Fingerprints</h3>
                <div class="value green" id="fpCount">0</div>
            </div>
        </div>

        <div class="row">
            <div class="card">
                <h2>📍 Live Location</h2>
                <div id="map"></div>
            </div>
            <div class="card">
                <h2>📡 Live Sensor Data</h2>
                <div id="liveData">
                    <p><strong>Accel X:</strong> <span id="liveX">--</span></p>
                    <p><strong>Accel Y:</strong> <span id="liveY">--</span></p>
                    <p><strong>Accel Z:</strong> <span id="liveZ">--</span></p>
                    <p><strong>Latitude:</strong> <span id="liveLat">--</span></p>
                    <p><strong>Longitude:</strong> <span id="liveLng">--</span></p>
                    <p><strong>Relay:</strong> <span id="liveRelay">--</span></p>
                    <p><strong>Last Update:</strong> <span id="liveTime">--</span></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================
// CONFIGURATION
// ============================================
const firebaseConfig = {
  apiKey: "AIzaSyDBQd85LTfSl6crkbIiM6HdZ48nxwE60WI",
  authDomain: "vehicle-web-dashboard.firebaseapp.com",
  databaseURL: "https://vehicle-web-dashboard-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "vehicle-web-dashboard",
  storageBucket: "vehicle-web-dashboard.firebasestorage.app",
  messagingSenderId: "890756908626",
  appId: "1:890756908626:web:8a1f205b40fe265134c18b"
};
    
firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const auth = firebase.auth();

// ============================================
// STATE
// ============================================
let map, marker, sensorListener, fpListener;
let mapInitialized = false;

// ============================================
// AUTHENTICATION LOGIC
// ============================================

// Monitor real-time Auth state changes
auth.onAuthStateChanged((user) => {
    if (user) {
        // Logged In successfully
        document.getElementById('errorMessage').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        initDashboard();
    } else {
        // Logged out / UI reset
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
        stopListeners();
    }
});

function handleLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const errorDiv = document.getElementById('errorMessage');
    const loginBtn = document.getElementById('loginBtn');
    
    if (!email || !password) {
        errorDiv.textContent = "⚠️ Please fill in all fields.";
        errorDiv.style.display = 'block';
        return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = "Verifying...";

    // 1. Explicitly set local persistence to NONE (No auto-login on refresh)
    auth.setPersistence(firebase.auth.Auth.Persistence.NONE)
        .then(() => {
            // 2. Run actual sign-in method
            return auth.signInWithEmailAndPassword(email, password);
        })
        .then(() => {
            // Success logic handled globally by onAuthStateChanged
            loginBtn.disabled = false;
            loginBtn.textContent = "Unlock Dashboard";
            document.getElementById('passwordInput').value = '';
        })
        .catch((error) => {
            loginBtn.disabled = false;
            loginBtn.textContent = "Unlock Dashboard";
            errorDiv.textContent = "⚠️ " + error.message;
            errorDiv.style.display = 'block';
            document.getElementById('passwordInput').value = '';
        });
}

// Add Enter key listeners to inputs
document.getElementById('passwordInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') handleLogin(); });
document.getElementById('emailInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') handleLogin(); });

function handleLogout() {
    auth.signOut().catch(err => console.error("Signout error:", err));
}

function stopListeners() {
    if (sensorListener) sensorListener.off();
    if (fpListener) fpListener.off();
}

// ============================================
// DASHBOARD INITIALIZATION
// ============================================
function initDashboard() {
    if (!mapInitialized && document.getElementById('map')) {
        map = L.map('map').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);
        marker = L.marker([20.5937, 78.9629]).addTo(map);
        mapInitialized = true;
    } else if (mapInitialized && map) {
        setTimeout(() => { map.invalidateSize(); }, 100);
    }
    
    listenToSensorData();
    listenToFingerprints();
}

function listenToSensorData() {
    if (sensorListener) sensorListener.off();
    
    const sensorRef = database.ref('sensor_data');
    sensorListener = sensorRef.on('value', snapshot => {
        const data = snapshot.val();
        if (data) {
            updateUI(data);
            updateMap(data.lat || 20.5937, data.lng || 78.9629);
        }
    });
}

function listenToFingerprints() {
    if (fpListener) fpListener.off();
    
    const fpRef = database.ref('fingerprints');
    fpListener = fpRef.on('value', snapshot => {
        const data = snapshot.val();
        if (data) {
            document.getElementById('fpCount').textContent = Object.values(data).length;
        } else {
            document.getElementById('fpCount').textContent = '0';
        }
    });
}

function updateUI(data) {
    document.getElementById('relayStatus').textContent = data.relay_state ? '🟢 ON' : '🔴 OFF';
    document.getElementById('relayStatus').className = 'value ' + (data.relay_state ? 'green' : 'red');
    
    const ax = data.accel_x || 0;
    const ay = data.accel_y || 0;
    const az = data.accel_z || 0;
    
    const totalG = Math.sqrt(ax*ax + ay*ay + az*az) / 9.81;
    document.getElementById('accelValue').textContent = totalG.toFixed(2) + 'G';
    
    const gpsFixed = data.lat && data.lng && data.lat !== 0 && data.lng !== 0;
    document.getElementById('gpsStatus').textContent = gpsFixed ? '📍 Fixed' : '⏳ Searching';
    document.getElementById('gpsStatus').className = 'value ' + (gpsFixed ? 'green' : 'yellow');
    
    document.getElementById('liveX').textContent = ax.toFixed(2);
    document.getElementById('liveY').textContent = ay.toFixed(2);
    document.getElementById('liveZ').textContent = az.toFixed(2);
    document.getElementById('liveLat').textContent = data.lat ? data.lat.toFixed(6) : '0.000000';
    document.getElementById('liveLng').textContent = data.lng ? data.lng.toFixed(6) : '0.000000';
    document.getElementById('liveRelay').textContent = data.relay_state ? 'ON' : 'OFF';
    document.getElementById('liveTime').textContent = new Date().toLocaleString();
}

function updateMap(lat, lng) {
    if (lat !== 0 && lng !== 0 && marker && map) {
        marker.setLatLng([lat, lng]);
        map.setView([lat, lng], 15);
    }
}

window.addEventListener('beforeunload', stopListeners);
</script>
</body>
</html>
