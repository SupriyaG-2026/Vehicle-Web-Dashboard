<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Dashboard - Admin Panel</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- Leaflet for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0a0e17; color: #fff; min-height: 100vh; }
        
        #loginPage {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e17, #1a1a2e);
        }
        
        .login-box {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        .login-box h1 { color: #00d4ff; text-align: center; margin-bottom: 5px; }
        .login-box p { color: #a0aec0; text-align: center; margin-bottom: 30px; font-size: 14px; }
        
        .login-box input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        .login-box input:focus { outline: none; border-color: #00d4ff; }
        
        .login-box .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .btn-primary { background: #00d4ff; color: #0a0e17; }
        .btn-primary:hover { background: #00b8e6; transform: scale(1.02); }
        
        .btn-danger { background: #fc8181; color: #0a0e17; }
        .btn-danger:hover { background: #f56565; }
        
        .error-msg { color: #fc8181; font-size: 13px; text-align: center; margin-top: 10px; }
        .success-msg { color: #48bb78; font-size: 13px; text-align: center; margin-top: 10px; }
        
        #mainApp { display: none; }
        
        .navbar {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00d4ff;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .navbar h1 { color: #00d4ff; font-size: 22px; }
        .navbar h1 span { color: #fff; }
        
        .nav-links {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .user-info {
            color: #a0aec0;
            font-size: 13px;
            padding: 5px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }
        
        .logout-btn {
            background: rgba(252, 129, 129, 0.2);
            color: #fc8181;
            border: 1px solid rgba(252, 129, 129, 0.2);
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
        }
        .logout-btn:hover { background: rgba(252, 129, 129, 0.4); }
        
        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }
        
        .stat-card h3 { color: #a0aec0; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .value { font-size: 28px; font-weight: bold; margin-top: 5px; }
        .stat-card .value.green { color: #48bb78; }
        .stat-card .value.red { color: #fc8181; }
        .stat-card .value.blue { color: #63b3ed; }
        .stat-card .value.yellow { color: #f6ad55; }
        
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }
        
        .card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }
        
        .card h2 { font-size: 16px; color: #00d4ff; margin-bottom: 15px; }
        #map { height: 350px; border-radius: 8px; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 10px;
            background: #1a1a2e;
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: #fff;
            display: none;
            z-index: 999;
            max-width: 400px;
        }
        .toast.show { display: block; animation: slideIn 0.3s ease; }
        .toast.success { border-color: #48bb78; }
        .toast.error { border-color: #fc8181; }
        .toast.info { border-color: #63b3ed; }
        
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @media (max-width: 900px) {
            .row { grid-template-columns: 1fr; }
            .navbar { flex-direction: column; align-items: stretch; }
            .nav-links { justify-content: center; }
        }
    </style>
</head>
<body>

<!-- Login Page -->
<div id="loginPage">
    <div class="login-box">
        <h1>🚗 Vehicle Admin</h1>
        <p>Login with your Firebase credentials</p>
        
        <input type="email" id="loginEmail" placeholder="Email" autocomplete="off">
        <input type="password" id="loginPassword" placeholder="Password" autocomplete="off">
        
        <button class="btn btn-primary" onclick="login()">🔐 Login</button>
        
        <div id="loginError" class="error-msg"></div>
        <div id="loginSuccess" class="success-msg"></div>
    </div>
</div>

<!-- Main App -->
<div id="mainApp">
    <nav class="navbar">
        <h1>🚗 Vehicle <span>Dashboard</span></h1>
        <div class="nav-links">
            <span class="user-info" id="userEmail">Loading...</span>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>
    </nav>

    <div class="container">
        <div id="toast" class="toast"></div>

        <div class="stats">
            <div class="stat-card">
                <h3>Relay Status</h3>
                <div class="value" id="relayStatus">--</div>
            </div>
            <div class="stat-card">
                <h3>Acceleration (G)</h3>
                <div class="value blue" id="accelValue">0.00</div>
            </div>
            <div class="stat-card">
                <h3>GPS Status</h3>
                <div class="value" id="gpsStatus">--</div>
            </div>
            <div class="stat-card">
                <h3>Fingerprints</h3>
                <div class="value green" id="fpCount">0</div>
            </div>
        </div>

        <div class="row">
            <div class="card">
                <h2>📍 Live Location</h2>
                <div id="map"></div>
            </div>
            <div class="card">
                <h2>📡 Live Sensor Data</h2>
                <div id="liveData">
                    <p><strong>Accel X:</strong> <span id="liveX">--</span></p>
                    <p><strong>Accel Y:</strong> <span id="liveY">--</span></p>
                    <p><strong>Accel Z:</strong> <span id="liveZ">--</span></p>
                    <p><strong>Latitude:</strong> <span id="liveLat">--</span></p>
                    <p><strong>Longitude:</strong> <span id="liveLng">--</span></p>
                    <p><strong>Relay:</strong> <span id="liveRelay">--</span></p>
                    <p><strong>Last Update:</strong> <span id="liveTime">--</span></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================
// FIREBASE CONFIGURATION
// ============================================
const firebaseConfig = {
  apiKey: "AIzaSyDBQd85LTfSl6crkbIiM6HdZ48nxwE60WI",
  authDomain: "vehicle-web-dashboard.firebaseapp.com",
  databaseURL: "https://vehicle-web-dashboard-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "vehicle-web-dashboard",
  storageBucket: "vehicle-web-dashboard.firebasestorage.app",
  messagingSenderId: "890756908626",
  appId: "1:890756908626:web:8a1f205b40fe265134c18b"
};
    
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const database = firebase.database();

// ============================================
// STATE
// ============================================
let map, marker, sensorListener, fpListener;
let mapInitialized = false;

// ============================================
// LOGIN / LOGOUT
// ============================================
function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const errorEl = document.getElementById('loginError');
    const successEl = document.getElementById('loginSuccess');
    
    errorEl.textContent = '';
    successEl.textContent = '';
    
    if (!email || !password) {
        errorEl.textContent = '❌ Please enter email and password';
        return;
    }
    
    // Show loading
    const btn = document.querySelector('.login-box .btn');
    btn.textContent = '⏳ Logging in...';
    btn.disabled = true;
    
    auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
            successEl.textContent = '✅ Login successful!';
            btn.textContent = '🔐 Login';
            btn.disabled = false;
            // Clear fields for security
            document.getElementById('loginPassword').value = '';
        })
        .catch(error => {
            errorEl.textContent = '❌ ' + error.message;
            btn.textContent = '🔐 Login';
            btn.disabled = false;
        });
}

function logout() {
    // Show loading state
    const logoutBtn = document.querySelector('.logout-btn');
    logoutBtn.textContent = '⏳ Logging out...';
    logoutBtn.disabled = true;
    
    // Clean up Firebase listeners
    if (sensorListener) {
        sensorListener.off();
        sensorListener = null;
    }
    if (fpListener) {
        fpListener.off();
        fpListener = null;
    }
    
    // Clear local storage
    localStorage.removeItem('firebase:host:vehicle-web-dashboard-default-rtdb.firebaseio.com');
    localStorage.removeItem('firebase:authUser:AIzaSyB...');
    
    // Sign out from Firebase
    auth.signOut()
        .then(() => {
            // Clear all Firebase related data from session storage
            sessionStorage.clear();
            localStorage.clear();
            
            // Reset UI
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('loginError').textContent = '';
            document.getElementById('loginSuccess').textContent = '';
            document.getElementById('loginPassword').value = '';
            mapInitialized = false;
            
            // Remove map
            if (map) {
                map.remove();
                map = null;
                marker = null;
            }
            
            // Reset logout button
            logoutBtn.textContent = '🚪 Logout';
            logoutBtn.disabled = false;
            
            showToast('✅ Logged out successfully!', 'success');
        })
        .catch(error => {
            console.error('Logout error:', error);
            logoutBtn.textContent = '🚪 Logout';
            logoutBtn.disabled = false;
            showToast('❌ Logout error: ' + error.message, 'error');
        });
}

// ============================================
// AUTH STATE LISTENER
// ============================================
// Track if this is a manual logout
let manualLogout = false;

auth.onAuthStateChanged(user => {
    // Skip if this was a manual logout
    if (manualLogout) {
        manualLogout = false;
        return;
    }
    
    if (user) {
        document.getElementById('userEmail').textContent = user.email || user.phoneNumber || 'User';
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        initDashboard();
    } else {
        // Check if user was previously logged in
        const wasLoggedIn = sessionStorage.getItem('wasLoggedIn');
        if (wasLoggedIn === 'true') {
            // This was a manual logout or session expired
            sessionStorage.removeItem('wasLoggedIn');
        }
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('loginPage').style.display = 'flex';
    }
});

// ============================================
// DASHBOARD
// ============================================
function initDashboard() {
    // Store login state
    sessionStorage.setItem('wasLoggedIn', 'true');
    
    // Initialize map once
    if (!mapInitialized && document.getElementById('map')) {
        map = L.map('map').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);
        marker = L.marker([20.5937, 78.9629]).addTo(map);
        mapInitialized = true;
    } else if (mapInitialized && map) {
        setTimeout(() => map.invalidateSize(), 500);
    }
    
    listenToSensorData();
    listenToFingerprints();
}

function listenToSensorData() {
    if (sensorListener) {
        sensorListener.off();
        sensorListener = null;
    }
    
    const sensorRef = database.ref('sensor_data');
    sensorListener = sensorRef.on('value', snapshot => {
        const data = snapshot.val();
        if (data) {
            updateUI(data);
            updateMap(data.lat || 20.5937, data.lng || 78.9629);
        }
    });
}

function listenToFingerprints() {
    if (fpListener) {
        fpListener.off();
        fpListener = null;
    }
    
    const fpRef = database.ref('fingerprints');
    fpListener = fpRef.on('value', snapshot => {
        const data = snapshot.val();
        if (data) {
            document.getElementById('fpCount').textContent = Object.values(data).length;
        } else {
            document.getElementById('fpCount').textContent = '0';
        }
    });
}

function updateUI(data) {
    document.getElementById('relayStatus').textContent = data.relay_state ? '🟢 ON' : '🔴 OFF';
    document.getElementById('relayStatus').className = 'value ' + (data.relay_state ? 'green' : 'red');
    
    const totalG = Math.sqrt(data.accel_x*data.accel_x + data.accel_y*data.accel_y + data.accel_z*data.accel_z) / 9.81;
    document.getElementById('accelValue').textContent = totalG.toFixed(2) + 'G';
    
    const gpsFixed = data.lat !== 0 && data.lng !== 0;
    document.getElementById('gpsStatus').textContent = gpsFixed ? '📍 Fixed' : '⏳ Searching';
    document.getElementById('gpsStatus').className = 'value ' + (gpsFixed ? 'green' : 'yellow');
    
    document.getElementById('liveX').textContent = data.accel_x.toFixed(2);
    document.getElementById('liveY').textContent = data.accel_y.toFixed(2);
    document.getElementById('liveZ').textContent = data.accel_z.toFixed(2);
    document.getElementById('liveLat').textContent = data.lat.toFixed(6);
    document.getElementById('liveLng').textContent = data.lng.toFixed(6);
    document.getElementById('liveRelay').textContent = data.relay_state ? 'ON' : 'OFF';
    document.getElementById('liveTime').textContent = new Date().toLocaleString();
}

function updateMap(lat, lng) {
    if (lat !== 0 && lng !== 0 && marker) {
        marker.setLatLng([lat, lng]);
        map.setView([lat, lng], 15);
    }
}

function showToast(message, type = 'info') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast show ' + type;
    clearTimeout(toast._timeout);
    toast._timeout = setTimeout(() => {
        toast.className = 'toast';
    }, 5000);
}

// ============================================
// ENTER KEY SUPPORT
// ============================================
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') {
        login();
    }
});

// ============================================
// PAGE UNLOAD - Cleanup
// ============================================
window.addEventListener('beforeunload', function() {
    if (sensorListener) {
        sensorListener.off();
    }
    if (fpListener) {
        fpListener.off();
    }
});

console.log('🚗 Vehicle Dashboard loaded - Firebase Auth Only');
console.log('💡 Login with your Firebase credentials');
</script>
</body>
</html>
