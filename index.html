<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Trip Monitor</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg: #0a0e17; --card: #141a2e; --accent: #00d4ff;
            --green: #48bb78; --red: #fc8181; --text: #e2e8f0;
            --muted: #718096; --border: rgba(0,212,255,0.15);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh}
        #loginScreen{display:flex;justify-content:center;align-items:center;min-height:100vh}
        .login-card{background:var(--card);padding:40px;border-radius:16px;border:1px solid var(--border);width:100%;max-width:400px;text-align:center}
        .login-card h2{color:var(--accent);margin-bottom:10px}
        .login-card p{color:var(--muted);font-size:14px;margin-bottom:20px}
        .input-group{margin-bottom:16px;text-align:left}
        .input-group label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px}
        .input-group input{width:100%;padding:12px;background:#0f1123;border:1px solid var(--border);border-radius:8px;color:#fff;font-size:15px}
        .btn{width:100%;padding:12px;background:var(--accent);color:#0a0e17;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:15px}
        .btn:hover{opacity:.9}
        #errorMsg{color:var(--red);font-size:13px;margin-top:12px;display:none}
        #mainApp{display:none}
        .navbar{background:var(--card);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--accent);flex-wrap:wrap;gap:10px}
        .navbar h1{color:var(--accent);font-size:20px}
        .logout-btn{background:transparent;color:var(--red);border:1px solid var(--red);padding:6px 16px;border-radius:6px;cursor:pointer}
        .show-all-btn{background:var(--accent);color:#0a0e17;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px}
        .container{max-width:1400px;margin:20px auto;padding:0 20px}
        .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
        .stat{background:var(--card);padding:16px;border-radius:10px;border:1px solid var(--border);text-align:center}
        .stat h3{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:2px}
        .stat .val{font-size:24px;font-weight:700;margin-top:4px}
        .green{color:var(--green)}.red{color:var(--red)}.blue{color:var(--accent)}.yellow{color:#f6ad55}
        .row{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;margin-bottom:20px}
        @media(max-width:900px){.row{grid-template-columns:1fr}}
        .card{background:var(--card);border-radius:12px;padding:18px;border:1px solid var(--border)}
        .card h2{font-size:15px;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        #map{height:420px;border-radius:8px;z-index:1}
        .trip-list{max-height:420px;overflow-y:auto}
        .trip-item{background:rgba(255,255,255,.03);padding:12px;border-radius:8px;margin-bottom:8px;border-left:3px solid var(--accent);cursor:pointer;transition:.2s}
        .trip-item:hover{background:rgba(255,255,255,.06)}
        .trip-item.selected{border-left-color:var(--green);background:rgba(72,187,120,.12)}
        .trip-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
        .trip-driver{font-weight:700;font-size:15px}
        .trip-time{font-size:11px;color:var(--muted)}
        .trip-detail{font-size:12px;color:var(--muted);margin-top:4px}
        .live-indicator{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px}
        .live-on{background:var(--green);animation:pulse 1.5s infinite}
        .live-off{background:var(--red)}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.6)}}
        .map-legend{font-size:11px;color:var(--muted);margin-top:8px;display:flex;gap:16px;flex-wrap:wrap}
        .legend-item{display:flex;align-items:center;gap:4px}
        .legend-dot{width:12px;height:12px;border-radius:50%}
        .legend-dot.live{background:#4285F4;box-shadow:0 0 8px #4285F4}
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h2>🚗 Vehicle Trip Monitor</h2>
        <p>Sign in to view live & historical trips</p>
        <div class="input-group"><label>Email</label><input id="emailInput" type="email" value="supriyakaddi26@gmail.com"></div>
        <div class="input-group"><label>Password</label><input id="passInput" type="password" value="Supriya@2026"></div>
        <button class="btn" id="loginBtn" onclick="login()">🔐 Sign In</button>
        <div id="errorMsg"></div>
    </div>
</div>

<div id="mainApp">
    <nav class="navbar">
        <h1>🚗 Trip Monitor</h1>
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
            <span style="font-size:12px;color:var(--muted)" id="userEmail"></span>
            <span><span class="live-indicator live-off" id="dbDot"></span><span style="font-size:11px;color:var(--muted)" id="dbText">Offline</span></span>
            <button class="logout-btn" onclick="auth.signOut()">🚪 Logout</button>
        </div>
    </nav>
    <div class="container">
        <div class="stat-row">
            <div class="stat"><h3>Engine</h3><div class="val" id="stEngine">--</div></div>
            <div class="stat"><h3>Speed</h3><div class="val blue" id="stSpeed">--</div></div>
            <div class="stat"><h3>GPS</h3><div class="val" id="stGPS">--</div></div>
            <div class="stat"><h3>Current Driver</h3><div class="val" style="font-size:16px" id="stDriver">--</div></div>
            <div class="stat"><h3>Trips Today</h3><div class="val yellow" id="stTrips">0</div></div>
        </div>
        <div class="row">
            <div class="card">
                <h2>
                    📍 Live Map
                    <button class="show-all-btn" onclick="showAllTrips()" style="margin-left:auto">🗺️ Show All Trips</button>
                </h2>
                <div id="map"></div>
                <div class="map-legend">
                    <div class="legend-item"><div class="legend-dot live"></div> Live Location</div>
                    <div class="legend-item"><div style="width:12px;height:3px;background:#f6ad55;border-radius:2px"></div> Selected Trip</div>
                    <div class="legend-item"><div style="width:12px;height:3px;background:var(--green);border-radius:2px"></div> Other Trips</div>
                </div>
            </div>
            <div class="card">
                <h2>📋 Trip History <button class="show-all-btn" onclick="showAllTrips()" style="margin-left:auto;font-size:11px">🗺️ Show All</button></h2>
                <div class="trip-list" id="tripList"><div style="color:var(--muted);text-align:center;padding:20px">Loading trips...</div></div>
            </div>
        </div>
    </div>
</div>

<script>
// ===== CONFIG =====
const firebaseConfig = {
    apiKey: "AIzaSyDBQd85LTfSl6crkbIiM6HdZ48nxwE60WI",
    authDomain: "vehicle-web-dashboard.firebaseapp.com",
    databaseURL: "https://vehicle-web-dashboard-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "vehicle-web-dashboard",
    storageBucket: "vehicle-web-dashboard.firebasestorage.app",
    messagingSenderId: "890756908626",
    appId: "1:890756908626:web:8a1f205b40fe265134c18b"
};
const SHEETS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRBeHFigSw8HUlD9PmSIFC3qAVAI6L3HDKRs_hkQR9jZ6RQzWXxqazn_cb5VqhxC32s2yYGQZx3DLZw/pub?gid=0&single=true&output=csv";

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ===== STATE =====
let map, liveMarker, liveCircle, pathLines = [], tripMarkers = [];
let trips = [];
let selectedTripIndex = -1;    // -1 = show all, >=0 = zoomed to one trip
let liveRelayState = false;
let isFollowingLive = true;    // true = map follows live marker

// ===== AUTH =====
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userEmail').textContent = user.email;
        initDashboard();
    } else {
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
    }
});

function login() {
    const email = document.getElementById('emailInput').value.trim();
    const pass = document.getElementById('passInput').value;
    const err = document.getElementById('errorMsg');
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Signing in...'; err.style.display = 'none';
    auth.signInWithEmailAndPassword(email, pass)
        .catch(e => { err.textContent = '❌ ' + e.message; err.style.display = 'block'; btn.disabled = false; btn.textContent = '🔐 Sign In'; });
}
document.getElementById('passInput').addEventListener('keypress', e => { if (e.key === 'Enter') login(); });

// ===== INIT =====
function initDashboard() {
    if (!map) {
        map = L.map('map').setView([12.9716, 77.5946], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 19}).addTo(map);
        
        // When user drags the map, stop following live marker
        map.on('dragstart', () => { isFollowingLive = false; });
    }
    db.ref('.info/connected').on('value', snap => {
        const on = snap.val();
        document.getElementById('dbDot').className = 'live-indicator ' + (on ? 'live-on' : 'live-off');
        document.getElementById('dbText').textContent = on ? 'Online' : 'Offline';
    });
    listenLive();
    loadSheetTrips();
}

// ===== LIVE DATA =====
function listenLive() {
    db.ref('device_profile/sensor_data').on('value', snap => {
        const d = snap.val();
        if (!d) return;
        const lat = parseFloat(d.lat || 0), lng = parseFloat(d.lng || 0);
        const relayOn = (d.relay_state === true || d.relay_state === 'true');
        const speed = parseFloat(d.speed || 0);

        document.getElementById('stEngine').innerHTML = relayOn ? '<span class="green">🟢 ON</span>' : '<span class="red">🔴 OFF</span>';
        document.getElementById('stSpeed').textContent = speed.toFixed(1) + ' km/h';
        document.getElementById('stGPS').innerHTML = (lat && lng) ? '<span class="green">📍 Fixed</span>' : '<span class="yellow">⏳ Searching</span>';
        document.getElementById('stDriver').textContent = d.driver || 'None';

        if (lat && lng) {
            updateLiveMarker(lat, lng);
        }

        if (relayOn !== liveRelayState) {
            liveRelayState = relayOn;
            if (relayOn) setTimeout(loadSheetTrips, 2000);
        }
    });
}

// ===== GOOGLE-STYLE BLUE DOT MARKER =====
function createBlueDotIcon() {
    return L.divIcon({
        html: `
            <div style="position:relative;width:22px;height:22px;">
                <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:22px;height:22px;background:#4285F4;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>
                <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;background:rgba(66,133,244,.2);border-radius:50%;animation:bluePulse 2s ease-out infinite"></div>
            </div>
        `,
        className: '',
        iconSize: [40, 40],
        iconAnchor: [20, 20]
    });
}

// Add the pulse animation dynamically
const pulseStyle = document.createElement('style');
pulseStyle.textContent = `
    @keyframes bluePulse {
        0% { transform: translate(-50%,-50%) scale(0.5); opacity: 1; }
        100% { transform: translate(-50%,-50%) scale(1.8); opacity: 0; }
    }
`;
document.head.appendChild(pulseStyle);

function updateLiveMarker(lat, lng) {
    if (!liveMarker) {
        liveMarker = L.marker([lat, lng], {icon: createBlueDotIcon(), zIndexOffset: 1000}).addTo(map);
        liveMarker.bindPopup('📍 Live Vehicle Location');
    } else {
        liveMarker.setLatLng([lat, lng]);
    }
    
    // Update accuracy circle
    if (!liveCircle) {
        liveCircle = L.circle([lat, lng], {
            radius: 15,
            color: '#4285F4',
            fillColor: '#4285F4',
            fillOpacity: 0.1,
            weight: 1.5,
            dashArray: '4,4'
        }).addTo(map);
    } else {
        liveCircle.setLatLng([lat, lng]);
    }
    
    // Follow live marker if not viewing a specific trip
    if (isFollowingLive && selectedTripIndex < 0) {
        map.panTo([lat, lng], {animate: true, duration: 0.5});
    }
}

// ===== SHEET TRIPS =====
function loadSheetTrips() {
    fetch(SHEETS_CSV)
        .then(r => r.text())
        .then(csv => {
            const rows = csv.split('\n').filter(l => l.trim());
            if (rows.length < 2) return;
            const headers = rows[0].split(',').map(h => h.trim().toLowerCase().replace(/\s+/g, '_'));
            const data = [];
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(',').map(c => c.trim());
                if (cols.length < 7) continue;
                const obj = {};
                headers.forEach((h, idx) => { obj[h] = cols[idx] || ''; });
                data.push(obj);
            }
            trips = extractTrips(data);
            document.getElementById('stTrips').textContent = trips.length;
            renderTripList();
            if (selectedTripIndex < 0) {
                renderAllTripsOnMap();
            }
        }).catch(e => console.error('Sheets error:', e));
}

function extractTrips(rows) {
    const tripList = [];
    let current = null;
    for (const row of rows) {
        const relay = (row.relay_state || '').toUpperCase() === 'TRUE';
        const lat = parseFloat(row.latitude || 0);
        const lng = parseFloat(row.longitude || 0);
        const ts = new Date(row.timestamp || Date.now());
        const driver = row.driver || 'None';
        const speed = parseFloat(row.speed || 0);
        const runtime = row.run_time || '0:00:00';

        if (relay && !current) {
            current = { driver, startTime: ts, endTime: ts, points: [], runtime: '0:00:00' };
        }
        if (current) {
            if (lat && lng) current.points.push({ lat, lng, ts, speed });
            current.endTime = ts;
            current.runtime = runtime;
            if (!relay) {
                tripList.push(current);
                current = null;
            }
        }
    }
    if (current) tripList.push(current);
    return tripList;
}

// ===== RENDER =====
function renderTripList() {
    const el = document.getElementById('tripList');
    if (!trips.length) {
        el.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px">No trips recorded yet</div>';
        return;
    }
    let html = '';
    trips.forEach((t, i) => {
        const dist = calcTripDistance(t);
        html += `<div class="trip-item ${i === selectedTripIndex ? 'selected' : ''}" onclick="toggleTrip(${i})">
            <div class="trip-header"><span class="trip-driver">👤 ${t.driver}</span><span class="trip-time">${t.startTime.toLocaleString()}</span></div>
            <div class="trip-detail">📏 ${dist.toFixed(2)} km | ⏱ ${t.runtime} | 📍 ${t.points.length} pts</div>
            <div class="trip-detail">🏁 End: ${t.endTime.toLocaleString()}</div>
        </div>`;
    });
    el.innerHTML = html;
}

function toggleTrip(i) {
    if (selectedTripIndex === i) {
        // Already selected → deselect, show all
        showAllTrips();
    } else {
        // Select this trip
        selectedTripIndex = i;
        isFollowingLive = false;  // Stop following live marker
        renderTripList();
        zoomToTrip(i);
    }
}

function showAllTrips() {
    selectedTripIndex = -1;
    isFollowingLive = true;  // Resume following live marker
    renderTripList();
    renderAllTripsOnMap();
    // If live marker exists, pan to it
    if (liveMarker) {
        const ll = liveMarker.getLatLng();
        map.setView([ll.lat, ll.lng], 14, {animate: true});
    }
}

function zoomToTrip(i) {
    const t = trips[i];
    if (t.points.length) {
        clearTripLines();
        const latlngs = t.points.map(p => [p.lat, p.lng]);
        const line = L.polyline(latlngs, {color:'#f6ad55', weight:4}).addTo(map);
        pathLines.push(line);
        
        // Add start marker
        const sm = L.circleMarker([t.points[0].lat, t.points[0].lng], {
            radius: 8, fillColor: '#f6ad55', color: '#fff', weight: 2, fillOpacity: 1
        }).addTo(map).bindPopup(`<b>${t.driver}</b><br>Start: ${t.startTime.toLocaleString()}`);
        tripMarkers.push(sm);
        
        // Add end marker
        const last = t.points[t.points.length - 1];
        const em = L.circleMarker([last.lat, last.lng], {
            radius: 8, fillColor: '#fc8181', color: '#fff', weight: 2, fillOpacity: 1
        }).addTo(map).bindPopup(`<b>End</b><br>${t.endTime.toLocaleString()}<br>Runtime: ${t.runtime}`);
        tripMarkers.push(em);
        
        const bounds = L.latLngBounds(latlngs);
        map.fitBounds(bounds, {padding: [40, 40]});
    }
}

function renderAllTripsOnMap() {
    clearTripLines();
    const colors = ['#48bb78','#63b3ed','#9f7aea','#00d4ff','#f6ad55','#fc8181'];
    trips.forEach((t, i) => {
        if (t.points.length < 2) return;
        const latlngs = t.points.map(p => [p.lat, p.lng]);
        const line = L.polyline(latlngs, {color: colors[i % colors.length], weight: 2.5, opacity: 0.7}).addTo(map);
        pathLines.push(line);
        const m = L.circleMarker([t.points[0].lat, t.points[0].lng], {
            radius: 6, fillColor: colors[i % 6], color: '#fff', weight: 2, fillOpacity: 1
        }).addTo(map).bindPopup(`<b>${t.driver}</b><br>Start: ${t.startTime.toLocaleString()}<br>Runtime: ${t.runtime}`);
        tripMarkers.push(m);
    });
}

function clearTripLines() {
    pathLines.forEach(l => map.removeLayer(l)); pathLines = [];
    tripMarkers.forEach(m => map.removeLayer(m)); tripMarkers = [];
}

function calcTripDistance(t) {
    let d = 0;
    for (let i = 1; i < t.points.length; i++) {
        const r = 6371;
        const dLat = (t.points[i].lat - t.points[i-1].lat) * Math.PI / 180;
        const dLng = (t.points[i].lng - t.points[i-1].lng) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(t.points[i-1].lat*Math.PI/180) * Math.cos(t.points[i].lat*Math.PI/180) * Math.sin(dLng/2)**2;
        d += r * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    return d;
}
</script>
</body>
</html>
